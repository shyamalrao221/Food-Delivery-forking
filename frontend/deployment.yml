apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-frontend-deployment
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: food-delivery-frontend-service
  template:
    metadata:
      labels:
        app: food-delivery-frontend-service
    spec:
      containers:
      - name: frontend-container
        image: us-central1-docker.pkg.dev/matchify-backend-shyamal-2026/my-docker-repo/food-delivery-frontend:7
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "35m"
            memory: "128Mi"
          limits:
            cpu: "150m"
            memory: "256Mi"
      
      # NEW: Monitoring Sidecar
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:latest
        args:
          - -nginx.scrape-uri=http://localhost:80/nginx_status
        ports:
        - containerPort: 9113
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"

---
# NEW: Tell GCP to collect these metrics
apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: frontend-monitoring
spec:
  selector:
    matchLabels:
      app: food-delivery-frontend-service
  endpoints:
  - port: 9113
    interval: 30s
