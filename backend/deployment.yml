apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-backend-deployment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: food-delivery-backend
  template:
    metadata:
      labels:
        app: food-delivery-backend
    spec:
      containers:
      - name: food-delivery-backend
        # Updated to point to your GCP Artifact Registry
        image: us-central1-docker.pkg.dev/matchify-backend-shyamal-2026/my-docker-repo/food-delivery-backend:7
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "250m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: PORT
          value: "5000"
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: food-delivery-backend-secrets
              key: MONGO_URL
        - name: MONGO_SERVER_SELECTION_TIMEOUT_MS
          value: "5000"
        - name: MONGO_RETRY_DELAY_MS
          value: "5000"

---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-backend-service
spec:
  # Changed to LoadBalancer so you get a public IP for your Frontend to connect to
  type: LoadBalancer
  selector:
    app: food-delivery-backend
  ports:
    - port: 5000
      targetPort: 5000
