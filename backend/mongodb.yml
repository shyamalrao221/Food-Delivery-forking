apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: food-delivery-mongodb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-mongodb-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: food-delivery-mongodb
  template:
    metadata:
      labels:
        app: food-delivery-mongodb
    spec:
      containers:
      - name: food-delivery-mongodb
        image: mongo:7.0
        args:
          - --bind_ip_all
        ports:
        - containerPort: 27017
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "250m"
            memory: "1Gi"
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: food-delivery-backend-secrets
              key: MONGO_INITDB_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: food-delivery-backend-secrets
              key: MONGO_INITDB_ROOT_PASSWORD
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 20
          periodSeconds: 20
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      volumes:
      - name: mongodb-data
        persistentVolumeClaim:
          claimName: food-delivery-mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-mongodb-service
spec:
  selector:
    app: food-delivery-mongodb
  ports:
    - port: 27017
      targetPort: 27017